<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bowling Simulation Engine</title>
<style>
/* ===== VIZ MODE STYLES ===== */
body.viz-mode {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
}
body.json-mode {
    font-family: 'Courier New', Courier, monospace;
    background: #fff;
    color: #111;
    margin: 0;
    padding: 20px;
    white-space: pre-wrap;
    word-wrap: break-word;
}
body.landing-mode {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
}
.landing { max-width: 720px; }
.landing h1 { color: #e94560; margin-bottom: 8px; font-size: 1.8rem; }
.landing h2 { color: #e94560; margin-top: 28px; font-size: 1.2rem; }
.landing code {
    background: #16213e;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
    color: #0f3460;
    color: #7ec8e3;
}
.landing pre {
    background: #16213e;
    padding: 14px;
    border-radius: 8px;
    overflow-x: auto;
    color: #7ec8e3;
    font-size: 0.85em;
    line-height: 1.5;
}
.landing a { color: #e94560; }
.landing ul { padding-left: 24px; }
.landing li { margin-bottom: 6px; }

/* Viz mode layout */
.viz-container {
    max-width: 960px;
    margin: 0 auto;
}
.viz-header {
    text-align: center;
    margin-bottom: 24px;
}
.viz-header h1 {
    font-size: 1.6rem;
    color: #e94560;
    margin: 0 0 6px 0;
}
.viz-header .params {
    font-size: 0.95rem;
    color: #888;
}
.viz-header .params span {
    color: #7ec8e3;
    font-weight: 600;
}

/* Scorecard table */
.scorecard {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    margin-bottom: 20px;
}
.scorecard th, .scorecard td {
    border: 1px solid #333;
    text-align: center;
    padding: 0;
}
.scorecard th {
    background: #16213e;
    color: #e94560;
    font-size: 0.85rem;
    padding: 6px 0;
    font-weight: 600;
}
.frame-cell {
    position: relative;
    height: 70px;
    vertical-align: bottom;
    background: #0f3460;
}
.frame-cell.tenth {
    /* 10th frame is wider */
}
.roll-boxes {
    position: absolute;
    top: 0;
    right: 0;
    display: flex;
}
.roll-box {
    width: 26px;
    height: 26px;
    border-left: 1px solid #333;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    background: #16213e;
}
.roll-box.strike { color: #e94560; }
.roll-box.spare { color: #4ecca3; }
.roll-box.gutter { color: #555; }
.cumulative {
    position: absolute;
    bottom: 4px;
    left: 0;
    right: 0;
    font-size: 1.1rem;
    font-weight: 700;
    color: #e0e0e0;
}

/* Total score */
.total-score {
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    color: #4ecca3;
    margin-top: 12px;
}
.total-score .label {
    font-size: 0.9rem;
    color: #888;
    font-weight: 400;
}

/* Frame detail table */
.detail-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 24px;
    font-size: 0.85rem;
}
.detail-table th {
    background: #16213e;
    color: #e94560;
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    border: 1px solid #333;
}
.detail-table td {
    padding: 6px 10px;
    border: 1px solid #333;
    background: #0f3460;
}
.detail-table tr:nth-child(even) td {
    background: #12315a;
}
</style>
</head>
<body>
<script>
// =============================================================================
// BOWLING SIMULATION ENGINE
// Deterministic, seeded, skill-parameterized bowling simulation
// =============================================================================

// === SEEDED PRNG: Mulberry32 ===
// A fast, high-quality 32-bit PRNG. Given the same seed, it always produces
// the same sequence of pseudo-random numbers in [0, 1).
function createRNG(seed) {
    let state = seed | 0;
    return function() {
        state |= 0;
        state = state + 0x6D2B79F5 | 0;
        let t = Math.imul(state ^ state >>> 15, 1 | state);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

// === SKILL MODEL ===
// Maps skill in [0, 1] to bowling performance parameters.
//
// Strike probability:  P_strike = 0.01 + 0.79 * skill^2
//   skill=0 → 1%,  skill=0.5 → ~21%,  skill=1 → 80%
//
// Spare probability:   P_spare = 0.05 + 0.70 * skill^1.5
//   skill=0 → 5%,  skill=0.5 → ~30%,  skill=1 → 75%
//
// Pin distribution (non-strike/spare): Power distribution
//   pins = floor(r^(1/(1 + 3*skill)) * (maxPins + 1))
//   Higher skill skews the distribution toward knocking down more pins.
//
const SkillModel = {
    strikeProb(skill) {
        return 0.01 + 0.79 * Math.pow(skill, 2);
    },

    spareProb(skill) {
        return 0.05 + 0.70 * Math.pow(skill, 1.5);
    },

    // Generate a pin count from a skill-weighted power distribution.
    // Higher skill → values cluster near maxPins.
    rollPins(rng, skill, maxPins) {
        if (maxPins <= 0) return 0;
        const r = rng();
        const exponent = 1 / (1 + 3 * skill);
        const pins = Math.floor(Math.pow(r, exponent) * (maxPins + 1));
        return Math.min(pins, maxPins);
    }
};

// === SINGLE-ROLL HELPER ===
// Simulates knocking down pins from `pinsUp` standing pins.
// `isFirstBall` determines whether to use strike or spare probability.
function simulateRoll(rng, skill, pinsUp, isFirstBall) {
    if (pinsUp <= 0) return 0;

    if (isFirstBall) {
        // Check for strike
        if (rng() < SkillModel.strikeProb(skill)) {
            return pinsUp; // Strike (all pins down)
        }
        // Non-strike: can knock down 0 to pinsUp-1
        return SkillModel.rollPins(rng, skill, pinsUp - 1);
    } else {
        // Second ball: check for spare (knocking down all remaining)
        if (rng() < SkillModel.spareProb(skill)) {
            return pinsUp; // Spare
        }
        // Non-spare: can knock down 0 to pinsUp-1
        return SkillModel.rollPins(rng, skill, pinsUp - 1);
    }
}

// === FRAME SIMULATION ===
// Simulates a single frame. Returns { rolls: [...] }.
// Respects official 10th-frame rules for bonus rolls.
function simulateFrame(rng, skill, isLastFrame) {
    const rolls = [];

    // --- Roll 1 ---
    const roll1 = simulateRoll(rng, skill, 10, true);
    rolls.push(roll1);

    if (!isLastFrame) {
        // Frames 1-9: strike ends the frame
        if (roll1 === 10) return { rolls };

        // Roll 2: try to knock down remaining pins
        const roll2 = simulateRoll(rng, skill, 10 - roll1, false);
        rolls.push(roll2);
        return { rolls };
    }

    // --- 10th Frame ---
    if (roll1 === 10) {
        // Strike on ball 1 → reset pins for ball 2
        const roll2 = simulateRoll(rng, skill, 10, true);
        rolls.push(roll2);

        if (roll2 === 10) {
            // Two strikes → fresh pins for ball 3
            const roll3 = simulateRoll(rng, skill, 10, true);
            rolls.push(roll3);
        } else {
            // Ball 3 on remaining pins from ball 2
            const remaining = 10 - roll2;
            const roll3 = simulateRoll(rng, skill, remaining, false);
            rolls.push(roll3);
        }
    } else {
        // Non-strike ball 1
        const roll2 = simulateRoll(rng, skill, 10 - roll1, false);
        rolls.push(roll2);

        if (roll1 + roll2 === 10) {
            // Spare → bonus ball 3 on fresh pins
            const roll3 = simulateRoll(rng, skill, 10, true);
            rolls.push(roll3);
        }
        // No spare, no bonus ball
    }

    return { rolls };
}

// === FULL GAME SIMULATION ===
// Simulates 10 frames with a single RNG stream seeded once.
// Computes official bowling scores with strike/spare bonuses.
function simulateGame(skill, seed) {
    const rng = createRNG(seed);
    const frames = [];

    // 1. Simulate all 10 frames (rolls only)
    for (let i = 0; i < 10; i++) {
        frames.push(simulateFrame(rng, skill, i === 9));
    }

    // 2. Flatten rolls for lookahead scoring
    const allRolls = [];
    for (const f of frames) allRolls.push(...f.rolls);

    // 3. Compute scores frame by frame
    let rollIdx = 0;
    let cumulative = 0;
    const scoredFrames = [];

    for (let i = 0; i < 10; i++) {
        const r = frames[i].rolls;
        let frameScore;

        if (i < 9) {
            if (r[0] === 10) {
                // Strike: 10 + next 2 rolls
                frameScore = 10 + allRolls[rollIdx + 1] + allRolls[rollIdx + 2];
                rollIdx += 1;
            } else if (r[0] + r[1] === 10) {
                // Spare: 10 + next 1 roll
                frameScore = 10 + allRolls[rollIdx + 2];
                rollIdx += 2;
            } else {
                // Open frame
                frameScore = r[0] + r[1];
                rollIdx += 2;
            }
        } else {
            // 10th frame: sum of all rolls (no lookahead bonus)
            frameScore = r.reduce((a, b) => a + b, 0);
            rollIdx += r.length;
        }

        cumulative += frameScore;
        scoredFrames.push({
            frame_number: i + 1,
            rolls: r,
            frame_score: frameScore,
            cumulative_score: cumulative
        });
    }

    return {
        skill,
        seed,
        total_score: cumulative,
        frames: scoredFrames
    };
}

// === FRAME MODE OUTPUT ===
// Returns the JSON object for a single-frame simulation.
function frameModeOutput(skill, seed, isLastFrame) {
    const rng = createRNG(seed);
    const frame = simulateFrame(rng, skill, isLastFrame);
    const result = {
        skill: skill,
        seed: seed,
        is_last_frame: isLastFrame,
        roll1: frame.rolls[0]
    };

    if (frame.rolls.length >= 2) result.roll2 = frame.rolls[1];
    if (frame.rolls.length >= 3) result.roll3 = frame.rolls[2];

    return result;
}

// === VISUALIZATION RENDERER ===
function renderViz(skill, seed) {
    const game = simulateGame(skill, seed);

    document.body.className = 'viz-mode';

    // Format a roll value for scorecard display
    function rollDisplay(pins, isFirstBall, prevPins) {
        if (pins === 10 && isFirstBall) return { text: 'X', cls: 'strike' };
        if (!isFirstBall && prevPins + pins === 10) return { text: '/', cls: 'spare' };
        if (pins === 0) return { text: '-', cls: 'gutter' };
        return { text: String(pins), cls: '' };
    }

    let html = '<div class="viz-container">';

    // Header
    html += '<div class="viz-header">';
    html += '<h1>Bowling Simulation</h1>';
    html += '<div class="params">';
    html += 'Skill: <span>' + skill.toFixed(2) + '</span> &nbsp;|&nbsp; ';
    html += 'Seed: <span>' + seed + '</span>';
    html += '</div></div>';

    // Scorecard
    html += '<table class="scorecard"><thead><tr>';
    for (let i = 1; i <= 10; i++) {
        html += '<th' + (i === 10 ? ' style="width:14%"' : '') + '>' + i + '</th>';
    }
    html += '</tr></thead><tbody><tr>';

    for (let i = 0; i < 10; i++) {
        const f = game.frames[i];
        const rolls = f.rolls;
        const isTenth = (i === 9);
        html += '<td class="frame-cell' + (isTenth ? ' tenth' : '') + '">';
        html += '<div class="roll-boxes">';

        if (!isTenth) {
            // Frames 1-9
            if (rolls[0] === 10) {
                // Strike: show empty first box, X in second
                html += '<div class="roll-box"></div>';
                const d = rollDisplay(10, true, 0);
                html += '<div class="roll-box ' + d.cls + '">' + d.text + '</div>';
            } else {
                const d1 = rollDisplay(rolls[0], true, 0);
                html += '<div class="roll-box ' + d1.cls + '">' + d1.text + '</div>';
                const d2 = rollDisplay(rolls[1], false, rolls[0]);
                html += '<div class="roll-box ' + d2.cls + '">' + d2.text + '</div>';
            }
        } else {
            // 10th frame: up to 3 boxes
            // Ball 1
            const d1 = rollDisplay(rolls[0], true, 0);
            html += '<div class="roll-box ' + d1.cls + '">' + d1.text + '</div>';

            // Ball 2
            if (rolls.length >= 2) {
                if (rolls[0] === 10) {
                    // After strike, ball 2 is on fresh pins
                    const d2 = rollDisplay(rolls[1], true, 0);
                    html += '<div class="roll-box ' + d2.cls + '">' + d2.text + '</div>';
                } else {
                    const d2 = rollDisplay(rolls[1], false, rolls[0]);
                    html += '<div class="roll-box ' + d2.cls + '">' + d2.text + '</div>';
                }
            }

            // Ball 3
            if (rolls.length >= 3) {
                if (rolls[0] === 10 && rolls[1] === 10) {
                    // Two strikes: ball 3 is on fresh pins
                    const d3 = rollDisplay(rolls[2], true, 0);
                    html += '<div class="roll-box ' + d3.cls + '">' + d3.text + '</div>';
                } else if (rolls[0] === 10 && rolls[1] < 10) {
                    // Strike then non-strike: ball 3 is on remaining
                    const d3 = rollDisplay(rolls[2], false, rolls[1]);
                    html += '<div class="roll-box ' + d3.cls + '">' + d3.text + '</div>';
                } else {
                    // Spare: ball 3 is on fresh pins
                    const d3 = rollDisplay(rolls[2], true, 0);
                    html += '<div class="roll-box ' + d3.cls + '">' + d3.text + '</div>';
                }
            }
        }

        html += '</div>'; // roll-boxes
        html += '<div class="cumulative">' + f.cumulative_score + '</div>';
        html += '</td>';
    }

    html += '</tr></tbody></table>';

    // Total score
    html += '<div class="total-score">';
    html += '<div class="label">Total Score</div>';
    html += game.total_score;
    html += '</div>';

    // Detail table
    html += '<table class="detail-table"><thead><tr>';
    html += '<th>Frame</th><th>Rolls</th><th>Frame Score</th><th>Cumulative</th>';
    html += '</tr></thead><tbody>';
    for (const f of game.frames) {
        html += '<tr>';
        html += '<td>' + f.frame_number + '</td>';
        html += '<td>[' + f.rolls.join(', ') + ']</td>';
        html += '<td>' + f.frame_score + '</td>';
        html += '<td>' + f.cumulative_score + '</td>';
        html += '</tr>';
    }
    html += '</tbody></table>';

    html += '</div>'; // viz-container

    document.body.innerHTML = html;
}

// === LANDING PAGE ===
function renderLanding() {
    document.body.className = 'landing-mode';
    document.body.innerHTML = '<div class="landing">' +
        '<h1>Bowling Simulation Engine</h1>' +
        '<p>A deterministic, skill-parameterized bowling simulation API.</p>' +
        '<h2>Usage</h2>' +
        '<p>Append query parameters to this URL:</p>' +
        '<pre>' +
        '?mode=frame&amp;skill=0.75&amp;seed=42&amp;isLastFrame=0\n' +
        '?mode=game&amp;skill=0.75&amp;seed=42\n' +
        '?mode=viz&amp;skill=0.75&amp;seed=42' +
        '</pre>' +
        '<h2>Parameters</h2>' +
        '<ul>' +
        '<li><code>mode</code> — <strong>frame</strong> | <strong>game</strong> | <strong>viz</strong></li>' +
        '<li><code>skill</code> — Float in [0, 1]. Controls bowling ability.</li>' +
        '<li><code>seed</code> — Integer. Determines random sequence for reproducibility.</li>' +
        '<li><code>isLastFrame</code> — 0 or 1 (frame mode only). Enables 10th-frame rules.</li>' +
        '</ul>' +
        '<h2>Modes</h2>' +
        '<ul>' +
        '<li><strong>frame</strong> — Simulates one frame. Returns JSON.</li>' +
        '<li><strong>game</strong> — Simulates a full 10-frame game. Returns JSON with scoring.</li>' +
        '<li><strong>viz</strong> — Renders a visual scorecard for a full game.</li>' +
        '</ul>' +
        '<h2>Try It</h2>' +
        '<p><a href="?mode=game&skill=0.75&seed=42">Game: skill=0.75, seed=42</a></p>' +
        '<p><a href="?mode=frame&skill=0.5&seed=100&isLastFrame=0">Frame: skill=0.5, seed=100</a></p>' +
        '<p><a href="?mode=viz&skill=0.85&seed=7">Viz: skill=0.85, seed=7</a></p>' +
        '</div>';
}

// === MAIN: ROUTE BY MODE ===
(function main() {
    const params = new URLSearchParams(window.location.search);
    const mode   = params.get('mode');
    const skill  = parseFloat(params.get('skill'));
    const seed   = parseInt(params.get('seed'), 10);

    // No mode → landing page
    if (!mode) {
        renderLanding();
        return;
    }

    // Validate common parameters
    if (isNaN(skill) || skill < 0 || skill > 1) {
        document.body.className = 'json-mode';
        document.body.textContent = JSON.stringify(
            { error: "skill must be a float in [0, 1]" }, null, 2
        );
        return;
    }
    if (isNaN(seed)) {
        document.body.className = 'json-mode';
        document.body.textContent = JSON.stringify(
            { error: "seed must be an integer" }, null, 2
        );
        return;
    }

    if (mode === 'frame') {
        const isLastFrameParam = params.get('isLastFrame');
        if (isLastFrameParam === null || (isLastFrameParam !== '0' && isLastFrameParam !== '1')) {
            document.body.className = 'json-mode';
            document.body.textContent = JSON.stringify(
                { error: "isLastFrame must be 0 or 1" }, null, 2
            );
            return;
        }
        const isLastFrame = isLastFrameParam === '1';
        const result = frameModeOutput(skill, seed, isLastFrame);
        document.body.className = 'json-mode';
        document.body.textContent = JSON.stringify(result, null, 2);

    } else if (mode === 'game') {
        const result = simulateGame(skill, seed);
        document.body.className = 'json-mode';
        document.body.textContent = JSON.stringify(result, null, 2);

    } else if (mode === 'viz') {
        renderViz(skill, seed);

    } else {
        document.body.className = 'json-mode';
        document.body.textContent = JSON.stringify(
            { error: "mode must be 'frame', 'game', or 'viz'" }, null, 2
        );
    }
})();
</script>
</body>
</html>
